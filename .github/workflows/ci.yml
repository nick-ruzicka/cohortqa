name: CohortQA CI

# Runs the cohortqa test suite (currently 165 tests) on every push and
# pull request.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pydantic pyyaml anthropic playwright pytest

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pyproject.toml') }}

      - name: Install Playwright Chromium
        # Several tests (test_runner_smoke, test_replayer) actually launch
        # headless Chromium. The "tests auto-skip if browser missing" claim
        # in older versions of this workflow was wrong.
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Run cohortqa tests
        run: python -m pytest cohortqa/tests/ -q

  # Optional lint job — runs ruff if it's configured at the repo root.
  # Skipped gracefully if no ruff config is present.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Ruff (allow no-config soft-fail)
        run: ruff check cohortqa/ || echo "ruff returned non-zero — review separately"
