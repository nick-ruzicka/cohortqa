name: PersonaLab CI

# Runs the personalab test suite (currently 165 tests) on every push
# and pull request that touches the framework. Stays out of the way
# of unrelated careerops changes by filtering paths.

on:
  push:
    branches: [main]
    paths:
      - "personalab/**"
      - ".github/workflows/personalab-ci.yml"
  pull_request:
    paths:
      - "personalab/**"
      - ".github/workflows/personalab-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime dependencies
        # The tests don't actually drive a real browser (the smoke test
        # auto-skips if Playwright isn't usable), so we don't need
        # `playwright install chromium`. Just the Python packages.
        run: |
          python -m pip install --upgrade pip
          python -m pip install pydantic pyyaml anthropic playwright pytest

      - name: Run personalab tests
        run: python -m pytest personalab/tests/ -q

  # Optional lint job — runs ruff if it's configured at the repo root.
  # Skipped gracefully if no ruff config is present.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Ruff (allow no-config soft-fail)
        run: ruff check personalab/ || echo "ruff returned non-zero — review separately"
