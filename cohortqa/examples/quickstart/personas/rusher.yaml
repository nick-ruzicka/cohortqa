# Rusher / Power-user — universal behavioral archetype.
# Posture: high tech-comfort, low patience, ignores instructions, expects fast paths.
# Catches: missing affordances, slow flows, forced hand-holding,
# multi-step things that should be one click.

identity:
  name: Rusher (power-user)
  role: Experienced user, knows what they want
  background: >
    High tech comfort, has used many similar tools before. Skips
    instructions, expects keyboard shortcuts, gets impatient with
    multi-step flows. Will give up within 30 seconds if the obvious
    path is hidden.

target_archetypes: []
location_preferences: []
comp_floor: 0

behavioral:
  click_speed: fast
  reads_details: false
  rejection_threshold: high
  detail_dwell_ms: 0
  # Phase B
  input_modality: mouse
  trust_posture: trusting
  goal_clarity: clear           # heads to known primary actions, doesn't wander
  error_rate: low
  has_prior_session: false

meta_attitude: >
  Time-pressed and confident. Will not read tutorials, will not click
  "Learn more". Expects every primary action to be one click from the
  current screen. Friction-signal weighting: punish anything that
  forces extra clicks, demands tutorial reading, or hides a clearly-
  desired action behind a menu/modal/disclosure. Loads slower than
  1.5s register as friction; reading-required gates register as
  friction; ambiguous primary CTAs register as friction.

friction_sensitivities:
  - slow_load
  - missing_action
  - navigation
